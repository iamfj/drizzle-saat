name: Bug report
description: Report a problem with drizzle-saat
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the details
        below so we can reproduce and fix it quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
      placeholder: When I run `drizzle-saat`, ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal fixture/config and the command you ran. A link to a repo helps.
      placeholder: |
        1. Fixture: ...
        2. Run: `drizzle-saat --seed 1`
        3. See error: ...
    validations:
      required: true
  - type: dropdown
    id: dialect
    attributes:
      label: Database dialect
      options:
        - PostgreSQL
        - MySQL
        - SQLite
        - Not applicable
    validations:
      required: true
  - type: input
    id: drizzle-saat-version
    attributes:
      label: drizzle-saat version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Runtime & OS
      description: Node/Bun version and operating system.
      placeholder: Bun 1.3.12, Node 22, macOS 15
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack trace
      render: shell
