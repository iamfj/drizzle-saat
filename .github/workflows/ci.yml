name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun run build

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: bun install --frozen-lockfile
      # Build first so the built-bundle determinism guard (test/e2e/built-cli)
      # runs against real cli/index bundles instead of skipping.
      - run: bun run build
      - name: Unit + in-process DB tests (SQLite, PGlite)
        # `bun run test` scopes to ./test; bare `bun test` would also sweep in
        # the standalone examples/ suites, which aren't installed in CI.
        run: bun run test

  integration-mysql:
    name: MySQL integration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: saat_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s --health-timeout=5s --health-retries=10
    env:
      INTEGRATION: "1"
      MYSQL_URL: "mysql://root:root@127.0.0.1:3306/saat_test"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: MySQL integration tests
        run: bun test test/integration/mysql.test.ts
