name: Release

on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Admin PAT so the version-bump push bypasses the "main protection"
          # ruleset (which otherwise requires a PR for all changes to main).
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      # Recent npm (>= 11.5.1) for OIDC trusted publishing. `changeset publish`
      # shells out to `npm`, and the runner's bundled npm is too old.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile

      # CI gates — don't publish a broken release
      - run: bun run check
      - run: bun run typecheck
      # `bun run test` scopes to ./test; bare `bun test` would also sweep in the
      # standalone examples/ suites, which aren't installed in CI.
      - run: bun run test
      - run: bun run build

      # Consume changesets: bump version + rewrite CHANGELOG, then commit to main
      - name: Version packages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bunx changeset version
          if git diff --quiet; then
            echo "No pending changesets — nothing to release."
            exit 0
          fi
          git add -A
          git commit -m "chore(release): version packages [skip ci]"
          git push

      # No changesets remain, so the action takes the publish path. Auth is via
      # npm OIDC trusted publishing (no NPM_TOKEN — the package disallows tokens);
      # id-token: write mints the OIDC token and provenance is automatic.
      - name: Publish to npm
        uses: changesets/action@v1
        with:
          publish: bunx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
