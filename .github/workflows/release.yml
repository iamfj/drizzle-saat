name: Release

on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Admin PAT so the version-bump push bypasses the "main protection"
          # ruleset (which otherwise requires a PR for all changes to main).
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - run: bun install --frozen-lockfile

      # CI gates — don't publish a broken release
      - run: bun run check
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

      # Consume changesets: bump version + rewrite CHANGELOG, then commit to main
      - name: Version packages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bunx changeset version
          if git diff --quiet; then
            echo "No pending changesets — nothing to release."
            exit 0
          fi
          git add -A
          git commit -m "chore(release): version packages [skip ci]"
          git push

      # No changesets remain, so the action takes the publish path:
      # npm publish (+ provenance) + git tag + GitHub Release.
      - name: Publish to npm
        uses: changesets/action@v1
        with:
          publish: bunx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
